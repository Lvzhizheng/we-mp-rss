name: Base OS Full Image
on:
  push:
    branches:
      - main
    paths:  # 仅在指定文件变化时触发（可选）
      - 'Dockerfiles/base-full/Dockerfile'
  workflow_dispatch:  # 支持手动触发
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo  ${{secrets.TOKEN}} | docker login ghcr.io -u  ${{github.actor}} --password-stdin
      - name: Sow env
        run: cat /home/runner/.docker/config.json    
      - name: Build Docker Image
        run: |
          cd Dockerfiles/base-full
          docker build -t ghcr.io/rachelos/base-full:latest .
      - name: Push Docker Image
        run: docker push  ghcr.io/rachelos/base-full:latest